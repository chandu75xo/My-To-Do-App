# render.yaml
# Tells Render.com exactly how to build and run the backend.
# This file lives in the backend/ folder.
# Render detects it automatically when you connect your GitHub repo.

services:
  - type: web
    name: done-todo-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure value
      - key: JWT_SECRET_KEY
        generateValue: true        # Render auto-generates a secure value
      - key: DATABASE_URL
        value: sqlite:///todo.db   # SQLite on Render disk (upgrade to MySQL later)
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "true"
      # These you fill in manually in Render dashboard (sensitive values):
      # MAIL_USERNAME     → done.todoapp1@gmail.com
      # MAIL_PASSWORD     → your 16-char app password
      # VAPID_PUBLIC_KEY  → your VAPID public key
      # VAPID_PRIVATE_KEY → your VAPID private key
      # VAPID_CLAIM_EMAIL → done.todoapp1@gmail.com
      # FRONTEND_URL      → https://your-app.netlify.app (add after Netlify deploy)
